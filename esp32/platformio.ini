[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor options
monitor_speed = 115200

; Upload settings
upload_speed = 921600

; Build options
build_flags =
    -DCORE_DEBUG_LEVEL=2

; Library dependencies
lib_deps =
    ArduinoJson @ ^6.21.0

[env:wokwi-esp32]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DSIMULATION_MODE=1
